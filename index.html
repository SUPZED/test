<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <button class="new-chat" onclick="newChat()">+ Cuộc trò chuyện mới</button>
        <div id="history"></div>
    </aside>

    <main class="chat-container">
        <header class="chat-header">
            <div class="bot-info">
                <span class="bot-icon">🤖</span>
                <strong>AI Assistant</strong>
            </div>

            <div class="header-controls">
                <div class="auth">
                    <button onclick="showLogin()">Sign in</button>
                </div>

                <div class="music-control">
                    <button id="musicToggle" onclick="toggleMusic()">🎵 Music: Off</button>
                </div>
            </div>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message bot">Chào mừng đến với AI Assistant! Tôi có thể giúp gì cho bạn?</div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
                <input type="file" id="fileInput" accept="image/*,text/*" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()">📎</button>
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </main>

</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">×</button>
        <h3 id="modalTitle">Sign in</h3>
        <input type="text" id="tenUser" placeholder="Tên người dùng" style="display: none;">
        <input type="email" id="email" placeholder="Gmail">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button id="authSubmit" onclick="handleAuth()">Đăng nhập</button>
        <button onclick="showRegisterForm()">Đăng ký tài khoản</button>
    </div>
</div>

<audio id="backgroundMusic" loop>
    <source src="../Music/BelieverAV8.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script src="script.js"></script>
</body>
</html>
